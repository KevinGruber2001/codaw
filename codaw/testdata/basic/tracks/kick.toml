id   = "kick"
bus  = "drums"
gain = 0.0
pan  = 0.0

[[fx]]
type   = "eq_3band"
low_hz = 60
low_db = 3.0
mid_hz = 400
mid_db = -4.0
high_hz = 8000
high_db = -2.0

[[clip]]
file  = "samples/kick_01.wav"
start = 0.0
end   = 16.0
loop  = true
gain  = 0.0

# Automation: the kick gradually gets louder, from very quiet (-24 dB) at the
# start up to a slight boost (+6 dB) by beat 16. The engine ramps the track
# gain linearly between these points while it plays.
[[automation]]
target = "gain"

[[automation.point]]
beat  = 0
value = -24.0

[[automation.point]]
beat  = 16
value = 6.0
